<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Team 대시보드</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#11161f; --panel2:#161d28; --line:#222b38;
    --txt:#e6edf3; --dim:#8b97a7; --accent:#00ff41;
    --ceo:#cbd5e1; --secretary:#84CC16; --somi:#EC4899;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;padding:24px 18px 60px}
  .wrap{max-width:1120px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
  h1{font-size:23px;margin:0;letter-spacing:.5px}
  .sub{color:var(--dim);font-size:13px}
  .clock{margin-left:auto;color:var(--accent);font-variant-numeric:tabular-nums;font-size:13px}
  h2{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin:30px 0 13px;font-weight:600}
  /* agent cards */
  .agents{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
  .card:hover{transform:translateY(-2px)}
  .card.off{opacity:.4}
  .card.sel{border-color:var(--c)}
  .card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--c)}
  .card .top{display:flex;align-items:center;gap:11px}
  .emoji{font-size:27px;line-height:1}
  .nm{font-size:17px;font-weight:700}
  .role{font-size:11.5px;color:var(--dim);margin-top:1px}
  .tagline{font-size:12px;color:var(--txt);opacity:.85;margin:10px 0 12px;line-height:1.5}
  .meta{display:flex;gap:16px;border-top:1px solid var(--line);padding-top:10px}
  .meta div{font-size:11.5px;color:var(--dim)}
  .meta b{display:block;color:var(--c);font-size:17px;font-weight:700}
  /* controls */
  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--dim);padding:7px 16px;font-size:13px;cursor:pointer;font-weight:600}
  .seg button.on{background:var(--accent);color:#04210c}
  .nav{display:inline-flex;align-items:center;gap:6px}
  .nav button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px}
  .nav button:hover{border-color:var(--accent)}
  .period{font-size:14px;font-weight:600;min-width:170px;text-align:center}
  .today-btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .today-btn:hover{border-color:var(--accent)}
  .count{margin-left:auto;color:var(--dim);font-size:12px}
  /* views */
  .view{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px;min-height:120px}
  /* day list */
  .day-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .day-row:last-child{border-bottom:none}
  .day-row .tm{font-variant-numeric:tabular-nums;color:var(--accent);font-size:14px;width:52px;flex:none}
  .day-row .ag{font-size:13px;flex:none;width:120px}
  .day-row .tk{font-size:13px;color:var(--txt)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--c);margin-right:7px;vertical-align:middle}
  .empty{color:var(--dim);font-size:13px;text-align:center;padding:34px 0}
  /* week grid */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:6px}
  .wd{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 8px 10px;min-height:130px}
  .wd.today{border-color:var(--accent)}
  .wd h4{margin:0 0 8px;font-size:11.5px;color:var(--dim);font-weight:600;display:flex;justify-content:space-between}
  .wd h4 .dnum{color:var(--txt);font-size:13px;font-weight:700}
  .ev{font-size:11px;padding:4px 6px;border-radius:6px;background:var(--bg);border-left:3px solid var(--c);margin-bottom:5px;line-height:1.3}
  .ev .et{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600}
  /* month grid */
  .month{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:6px}
  .mhead{text-align:center;font-size:11px;color:var(--dim);font-weight:600;padding-bottom:2px}
  .mc{background:var(--panel2);border:1px solid var(--line);border-radius:8px;min-height:74px;padding:6px;cursor:pointer;transition:border-color .12s}
  .mc:hover{border-color:var(--accent)}
  .mc.out{opacity:.35}
  .mc.today{border-color:var(--accent)}
  .mc .dn{font-size:12px;font-weight:600;margin-bottom:4px}
  .mc .dots{display:flex;flex-wrap:wrap;gap:3px}
  .mc .dots span{width:7px;height:7px;border-radius:50%;background:var(--c)}
  .mc .more{font-size:9.5px;color:var(--dim)}
  footer{margin-top:30px;color:var(--dim);font-size:11.5px;text-align:center;line-height:1.7}
  code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:11px}
  .wl{display:flex;flex-wrap:wrap;gap:8px;padding:10px}
  .chip2{font-size:13px;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--somi);
    color:var(--txt);padding:6px 11px;border-radius:8px}
  .chip2 .code{color:var(--dim);font-size:11.5px;margin-left:5px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏢 AI Team 대시보드</h1>
    <span class="sub">실존 에이전트 3명 · 자동 루틴</span>
    <span class="clock" id="clock"></span>
  </header>

  <h2>에이전트 <span style="text-transform:none;letter-spacing:0;font-weight:400">— 카드를 눌러 일정에서 필터</span></h2>
  <div class="agents" id="agents"></div>

  <h2>📈 소미 관심종목 <span style="text-transform:none;letter-spacing:0;font-weight:400">— watchlist 기반 정기 보고 대상</span></h2>
  <div class="view" id="watchlist"></div>

  <h2>루틴 일정</h2>
  <div class="bar">
    <div class="seg" id="seg">
      <button data-v="day">일</button>
      <button data-v="week">주</button>
      <button data-v="month">월</button>
    </div>
    <div class="nav">
      <button id="prev">◀</button>
      <span class="period" id="period"></span>
      <button id="next">▶</button>
    </div>
    <button class="today-btn" id="todayBtn">오늘</button>
    <span class="count" id="count"></span>
  </div>
  <div class="view" id="view"></div>

  <footer>
    데이터: <code>skills/영숙_비서/tools/schedules.json</code> · cron을 브라우저 로컬시간으로 전개<br>
    일/주/월 토글 · ◀ ▶ 로 기간 이동 · 에이전트 카드로 필터 · 월간 날짜 클릭 시 해당 일로 이동
  </footer>
</div>

<script>
// ── 에이전트 (agents.ts 기준 실존 3명) ──────────────────────────────
const AGENTS = {
  "예원":{id:"ceo",emoji:"🧭",color:"#cbd5e1",role:"CEO · 오케스트레이터",
    tagline:"작업 분해·종합 판단·다음 액션 결정. 팀 전체를 조율합니다.",
    tools:["yewon_dispatcher","harness_manager","harness_monitor","skill_auditor","evaluate_feedback","daily_feedback_scheduler","upload_manager"]},
  "영숙":{id:"secretary",emoji:"📱",color:"#84CC16",role:"비서 · Personal Assistant",
    tagline:"일정·할 일·브리핑·텔레그램 소통을 챙깁니다.",
    tools:["telegram_receiver","morning_brief","calendar_manager","schedule_manager","reports_manager","posting_scheduler","upload_approval_flow","agent_controller","youtube_recommender"]},
  "소미":{id:"somi",emoji:"📈",color:"#EC4899",role:"국내주식 수급 분석가",
    tagline:"종목 수급·세력상황·매수 가능 구간을 냉정하게 판단합니다.",
    tools:["somi_kis_reporter","somi_screener","somi_trade_advisor","somi_position_monitor","somi_price_monitor","short_covering_analyzer","kis_trader","stock_search","watchlist_manager"]},
  "유나":{id:"yuna",emoji:"🌏",color:"#06B6D4",role:"아시아 시장 조사관",
    tagline:"watchlist DART 공시·환율·아시아 지수를 수집합니다.",
    tools:["asia_research"]},
  "행크":{id:"hank",emoji:"🦅",color:"#3B82F6",role:"미국 시장 조사관",
    tagline:"미국장·달러 흐름을 한국 개장 전에 정리합니다.",
    tools:["us_research"]},
  "레온":{id:"leon",emoji:"🏛️",color:"#6366F1",role:"유럽 시장 조사관",
    tagline:"유럽 지수·정책 동향을 수집합니다.",
    tools:["eu_research"]},
  "마켓데스크":{id:"desk",emoji:"📋",color:"#F59E0B",role:"시장 종합 데스크",
    tagline:"세 지역 조사를 하나의 시장 브리프로 종합합니다.",
    tools:["market_desk"]},
};
// ── 스케줄 (schedules.json 미러) ────────────────────────────────────
const SCHEDULES = [
  {agent:"영숙",task:"리포트 정리",        cron:"0 4 * * *"},
  {agent:"행크",task:"미국 시장 조사(수집)", cron:"30 6 * * 1-5"},
  {agent:"유나",task:"아시아 시장 조사(수집)", cron:"30 7 * * 1-5"},
  {agent:"마켓데스크",task:"시장 종합(수집)", cron:"50 7 * * 1-5"},
  {agent:"예원",task:"📨 장전 종합보고",   cron:"10 8 * * 1-5"},
  {agent:"예원",task:"일일 피드백 평가",   cron:"0 9 * * *"},
  {agent:"예원",task:"주간 스킬 감사",     cron:"0 9 * * 1"},
  {agent:"예원",task:"🚨 속보 감시",       cron:"0,30 8-15 * * 1-5"},
  {agent:"예원",task:"📨 장중 종합보고",   cron:"40 12 * * 1-5"},
  {agent:"레온",task:"유럽 시장 조사(수집)", cron:"0 16 * * 1-5"},
  {agent:"예원",task:"📨 마감 종합보고",   cron:"10 16 * * 1-5"},
  {agent:"예원",task:"주간 종합 리포트",   cron:"0 17 * * 5"},
];
const DOW = ["일","월","화","수","목","금","토"];
const MON = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

// ── 상태 ────────────────────────────────────────────────────────────
let view = "week";
let anchor = startOfDay(new Date());
const active = new Set(Object.keys(AGENTS)); // 필터: 켜진 에이전트

// ── cron 헬퍼 ───────────────────────────────────────────────────────
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fieldMatch(f,v){if(f==="*")return true;return f.split(",").some(p=>{if(p.includes("-")){const[a,b]=p.split("-").map(Number);return v>=a&&v<=b;}return Number(p)===v;});}
// 특정 '날짜'에 cron이 실행되면 [{h,m}] 반환 (분/시는 단일값 가정)
function timesOnDay(cron,date){
  const[mi,ho,,,dw]=cron.split(" ");
  if(!fieldMatch(dw,date.getDay()))return[];
  if(ho==="*"||mi==="*")return[{h:0,m:0,any:true}];
  return[{h:Number(ho),m:Number(mi)}];
}
// 기간 [start,end) 내 모든 실행 인스턴스
function occurrences(start,end){
  const out=[];
  for(let d=startOfDay(start); d<end; d=addDays(d,1)){
    for(const s of SCHEDULES){
      if(!active.has(s.agent))continue;
      for(const t of timesOnDay(s.cron,d)){
        const when=new Date(d); when.setHours(t.h,t.m,0,0);
        if(when>=start&&when<end)out.push({...s,when,any:t.any});
      }
    }
  }
  return out.sort((a,b)=>a.when-b.when);
}
function fmtCountdown(ms){if(ms<0)return"지남";const m=Math.floor(ms/60000),h=Math.floor(m/60),d=Math.floor(h/24);if(d>0)return`${d}일 후`;if(h>0)return`${h}시간 ${m%60}분 후`;return`${m}분 후`;}
function hhmm(d){return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}

// ── 렌더: 에이전트 카드 ─────────────────────────────────────────────
function renderAgents(){
  document.getElementById("agents").innerHTML=Object.entries(AGENTS).map(([name,a])=>{
    const routines=SCHEDULES.filter(s=>s.agent===name).length;
    const on=active.has(name);
    return `<div class="card ${on?'sel':'off'}" data-agent="${name}" style="--c:${a.color}">
      <div class="top"><span class="emoji">${a.emoji}</span>
        <div><div class="nm">${name}</div><div class="role">${a.role}</div></div></div>
      <div class="tagline">${a.tagline}</div>
      <div class="meta"><div><b>${a.tools.length}</b>도구</div><div><b>${routines}</b>자동 루틴</div></div>
    </div>`;
  }).join("");
  document.querySelectorAll(".card").forEach(el=>el.onclick=()=>{
    const n=el.dataset.agent;
    if(active.has(n)&&active.size>0){active.delete(n);} else {active.add(n);}
    if(active.size===0)Object.keys(AGENTS).forEach(k=>active.add(k)); // 전부 끄면 전체 복원
    renderAgents();render();
  });
}

// ── 렌더: 기간 라벨 + 범위 ──────────────────────────────────────────
function range(){
  if(view==="day")return[startOfDay(anchor),addDays(anchor,1)];
  if(view==="week"){const s=addDays(anchor,-((anchor.getDay()))); return[startOfDay(s),addDays(s,7)];}
  const s=new Date(anchor.getFullYear(),anchor.getMonth(),1);
  const e=new Date(anchor.getFullYear(),anchor.getMonth()+1,1);
  return[s,e];
}
function periodLabel(){
  const[s,e]=range();
  if(view==="day")return`${s.getMonth()+1}월 ${s.getDate()}일 (${DOW[s.getDay()]})`;
  if(view==="week"){const last=addDays(s,6);return`${s.getMonth()+1}.${s.getDate()} ~ ${last.getMonth()+1}.${last.getDate()} 주`;}
  return`${s.getFullYear()}년 ${MON[s.getMonth()]}`;
}

// ── 렌더: 뷰 본체 ───────────────────────────────────────────────────
function render(){
  document.querySelectorAll("#seg button").forEach(b=>b.classList.toggle("on",b.dataset.v===view));
  document.getElementById("period").textContent=periodLabel();
  const[s,e]=range();
  const occ=occurrences(s,e);
  document.getElementById("count").textContent=`${occ.length}건 실행`;
  const el=document.getElementById("view");
  if(view==="day")el.innerHTML=renderDay(occ);
  else if(view==="week")el.innerHTML=renderWeek(s,occ);
  else el.innerHTML=renderMonth(s,occ);
  if(view==="month")el.querySelectorAll(".mc[data-d]").forEach(c=>c.onclick=()=>{
    anchor=startOfDay(new Date(c.dataset.d));view="day";render();});
}
function renderDay(occ){
  if(!occ.length)return`<div class="empty">이 날 예정된 루틴이 없어요.</div>`;
  const now=new Date();
  return occ.map(o=>{const a=AGENTS[o.agent];
    const cd=sameDay(o.when,now)?` · <span style="color:var(--dim)">${fmtCountdown(o.when-now)}</span>`:"";
    return `<div class="day-row" style="--c:${a.color}">
      <span class="tm">${o.any?"수시":hhmm(o.when)}</span>
      <span class="ag"><span class="dot"></span>${a.emoji} ${o.agent}</span>
      <span class="tk">${o.task}${cd}</span></div>`;}).join("");
}
function renderWeek(start,occ){
  const today=new Date();
  let h="";
  for(let i=0;i<7;i++){
    const d=addDays(start,i);
    const evs=occ.filter(o=>sameDay(o.when,d));
    const cells=evs.map(o=>{const a=AGENTS[o.agent];
      return `<div class="ev" style="--c:${a.color}"><span class="et">${o.any?"수시":hhmm(o.when)}</span> ${a.emoji} ${o.task}</div>`;}).join("")
      ||`<div style="color:var(--dim);font-size:10.5px">—</div>`;
    h+=`<div class="wd ${sameDay(d,today)?'today':''}"><h4><span>${DOW[d.getDay()]}</span><span class="dnum">${d.getDate()}</span></h4>${cells}</div>`;
  }
  return `<div class="week">${h}</div>`;
}
function renderMonth(first,occ){
  const today=new Date();
  const startPad=first.getDay();
  const gridStart=addDays(first,-startPad);
  let h=DOW.map(d=>`<div class="mhead">${d}</div>`).join("");
  for(let i=0;i<42;i++){
    const d=addDays(gridStart,i);
    const out=d.getMonth()!==first.getMonth();
    const evs=occ.filter(o=>sameDay(o.when,d));
    const dots=evs.slice(0,8).map(o=>`<span style="background:${AGENTS[o.agent].color}"></span>`).join("");
    const more=evs.length>8?`<span class="more">+${evs.length-8}</span>`:"";
    h+=`<div class="mc ${out?'out':''} ${sameDay(d,today)?'today':''}" data-d="${d.toISOString()}">
      <div class="dn">${d.getDate()}</div><div class="dots">${dots}${more}</div></div>`;
    if(i>=34&&d.getMonth()!==first.getMonth()&&d>first&&(i+1)%7===0)break;
  }
  return `<div class="month">${h}</div>`;
}

// ── 이벤트 ──────────────────────────────────────────────────────────
document.querySelectorAll("#seg button").forEach(b=>b.onclick=()=>{view=b.dataset.v;render();});
document.getElementById("prev").onclick=()=>{shift(-1);};
document.getElementById("next").onclick=()=>{shift(1);};
document.getElementById("todayBtn").onclick=()=>{anchor=startOfDay(new Date());render();};
function shift(dir){
  if(view==="day")anchor=addDays(anchor,dir);
  else if(view==="week")anchor=addDays(anchor,7*dir);
  else anchor=new Date(anchor.getFullYear(),anchor.getMonth()+dir,1);
  render();
}
function tick(){document.getElementById("clock").textContent=new Date().toLocaleString("ko-KR",{dateStyle:"medium",timeStyle:"short"});}

function renderWatchlist(){
  const el=document.getElementById("watchlist");
  el.innerHTML=`<div class="empty">관심종목을 불러오는 중…</div>`;
  fetch("../../output/cache/somi_watchlist.json",{cache:"no-store"})
    .then(r=>r.ok?r.json():{})
    .then(wl=>{
      const ents=Object.entries(wl||{});
      if(!ents.length){el.innerHTML=`<div class="empty">등록된 관심종목이 없어요. 텔레그램에서 '관심종목 추가 &lt;코드&gt; &lt;종목명&gt;'으로 등록하세요.</div>`;return;}
      el.innerHTML=`<div class="wl">`+ents.map(([code,name])=>`<span class="chip2">📈 ${name}<span class="code">${code}</span></span>`).join("")+`</div>`;
    })
    .catch(()=>{el.innerHTML=`<div class="empty">관심종목 파일을 불러올 수 없어요. (로컬 파일로 열면 차단될 수 있어요 — 로컬 서버로 열어주세요.)</div>`;});
}

renderAgents();renderWatchlist();render();tick();
setInterval(tick,30000);
</script>
</body>
</html>
