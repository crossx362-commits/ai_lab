                    <label class="block text-xs font-bold text-gray-600">집사 이메일 주소</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="email" id="login-email-input" value="butler@petna.co.kr"
                            placeholder="email@example.com"
                            onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('login-password-input')?.focus();}"
                            class="w-full text-xs border border-gray-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 bg-gray-50/30 font-medium">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-xs font-bold text-gray-600">비밀번호</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="password" id="login-password-input" value="123456" placeholder="••••••••"
                            onkeydown="if(event.key==='Enter'){event.preventDefault();executeLogin();}"
                            class="w-full text-xs border border-gray-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 bg-gray-50/30 font-medium">
                    </div>
                </div>

                <div class="flex justify-between items-center text-xs font-bold text-gray-500">
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" checked
                            class="rounded border-gray-300 text-brand-500 focus:ring-brand-500 w-4 h-4">
                        <span>로그인 유지</span>
                    </label>
                    <a href="#" class="hover:text-brand-600 transition-colors">비밀번호 재설정</a>
                </div>

                <button id="login-submit-btn" onclick="executeLogin()"
                    class="w-full bg-brand-500 hover:bg-brand-600 text-white font-black text-xs py-3.5 rounded-xl transition-all shadow-md shadow-brand-500/15 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-right-to-bracket"></i> 이메일 주소로 로그인하기
                </button>

                <div class="text-center text-xs font-bold text-gray-500 mt-2">
                    아직 계정이 없으신가요?
                    <button onclick="toggleAuthForm('signup')"
                        class="text-brand-600 hover:underline outline-none ml-1">회원가입하기</button>
                </div>
            </div>

            <!-- Sign Up form section (hidden by default) -->
            <div id="signup-form-section" class="space-y-4 hidden">
                <div class="space-y-1.5">
                    <label class="block text-xs font-bold text-gray-600">이름 / 닉네임</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="text" id="signup-nickname-input" placeholder="보호자님의 멋진 닉네임"
                            class="w-full text-xs border border-gray-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 bg-gray-50/30 font-medium">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-xs font-bold text-gray-600">이메일 주소</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="email" id="signup-email-input" placeholder="email@example.com"
                            class="w-full text-xs border border-gray-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 bg-gray-50/30 font-medium">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-xs font-bold text-gray-600">비밀번호</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="password" id="signup-password-input" placeholder="최소 6자리 비밀번호"
                            onkeydown="if(event.key==='Enter'){event.preventDefault();executeSignUp();}"
                            class="w-full text-xs border border-gray-200 rounded-xl py-3 pl-10 pr-4 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 bg-gray-50/30 font-medium">
                    </div>
                </div>

                <button onclick="executeSignUp()"
                    class="w-full bg-brand-500 hover:bg-brand-600 text-white font-black text-xs py-3.5 rounded-xl transition-all shadow-md shadow-brand-500/15 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-plus"></i> 집사 계정 회원가입하기
                </button>

                <div class="text-center text-xs font-bold text-gray-500 mt-2">
                    이미 계정이 있으신가요?
                    <button onclick="toggleAuthForm('login')"
                        class="text-brand-600 hover:underline outline-none ml-1">로그인하기</button>
                </div>
            </div>

            <!-- Social login section -->
            <div class="space-y-3.5">
                <div class="relative flex py-1 items-center">
                    <div class="flex-grow border-t border-gray-200/80"></div>
                    <span class="flex-shrink mx-3 text-[10px] text-gray-400 font-bold uppercase">SNS 간편 로그인</span>
                    <div class="flex-grow border-t border-gray-200/80"></div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="executeSocialLogin('kakao')"
                        class="py-2.5 rounded-xl border border-yellow-200 bg-[#FFE812] hover:bg-[#FEE500] text-[#3C1E1E] font-black text-[11px] flex flex-col items-center justify-center gap-1 transition-all hover:scale-105 shadow-sm">
                        <i class="fa-solid fa-comment text-lg"></i>카카오 로그인
                    </button>
                    <button onclick="executeSocialLogin('google')"
                        class="py-2.5 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 font-black text-[11px] flex flex-col items-center justify-center gap-1 transition-all hover:scale-105 shadow-sm">
                        <i class="fa-brands fa-google text-rose-500 text-lg"></i>구글 로그인
                    </button>
                </div>
            </div>

            <div class="mt-3 bg-gray-50/50 rounded-xl p-3 border border-gray-100/50">
                <p class="text-[9.5px] text-center text-gray-400 font-medium leading-[1.4]">
                    로그인 시 펫과나의 <a href="#" class="underline hover:text-brand-500 font-bold">이용약관</a> 및 <a href="#"
                        class="underline hover:text-brand-500 font-bold">개인정보처리방침</a>에 동의하게 됩니다.
                </p>
                <div class="mt-2 pt-2 border-t border-gray-200/50 flex items-start gap-1.5 justify-center">
                    <i class="fa-solid fa-circle-info mt-0.5 text-[8px] text-gray-400"></i>
                    <p class="text-[9px] text-left text-gray-400/90 leading-[1.3] font-medium tracking-tight">
                        본 서비스가 제공하는 건강 데이터 및 통계는 참고용 정보이며, <br>전문 수의사의 의학적 진단이나 법적 효력을 대체할 수 없습니다.
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>

</html>
